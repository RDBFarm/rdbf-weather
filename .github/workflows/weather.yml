name: RDBF Weather Pre-Processor

on:
  schedule:
    # 09:35 UTC = 5:35 AM EDT (4:35 AM EST in winter).
    # Second run at 21:35 UTC = 5:35 PM EDT for an evening refresh.
    - cron: "35 9 * * *"
    - cron: "35 21 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

# Queue runs so they never overlap.
concurrency:
  group: weather-writer
  cancel-in-progress: false

permissions:
  contents: write

# A manual "Run workflow" is tagged run_type=manual in the JSON; the two
# scheduled runs are tagged run_type=scheduled. Lets you tell test runs apart.
env:
  RUN_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }}

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run weather pre-processor
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
        run: python fetch_weather.py

      # Human-readable at-a-glance status on the run's Summary page, so you can
      # see which sources returned data without opening the JSON.
      - name: Post run summary
        if: always()
        run: |
          python - <<'PY'
          import json, os

          lines = []
          try:
              with open("weather_summary.json") as f:
                  d = json.load(f)
          except Exception as e:
              d = None
              lines.append(f"weather_summary.json could not be read: {e}")

          if d:
              cc = d.get("current_conditions", {})
              soil = d.get("soil_temperature", {})
              nws = d.get("nws_alerts", {})
              uv = d.get("uv_index", {})
              dr = d.get("drought_status", {})
              rows = [
                  ("Weather Underground (current)", cc.get("temp_f") is not None),
                  ("Open-Meteo (soil / forecast)", soil.get("surface_0cm_f") is not None),
                  ("NWS alerts", nws.get("active_count") is not None),
                  ("UV index", uv.get("current_uvi") is not None),
                  ("Drought Monitor", dr.get("week_ending") is not None),
              ]
              errs = d.get("data_integrity", {}).get("errors_this_run", []) or []
              ok_count = sum(1 for _, c in rows if c)
              lines.append(f"## RDBF Weather run — {d.get('generated_et', '?')}")
              lines.append("")
              lines.append(f"**{ok_count}/{len(rows)} sources returned data**  ·  "
                           f"run type: `{d.get('run_type', '?')}`")
              lines.append("")
              lines.append("| Source | Status |")
              lines.append("|--------|:------:|")
              for name, c in rows:
                  lines.append(f"| {name} | {'✅' if c else '⚠️'} |")
              lines.append("")
              if errs:
                  lines.append("### Notes this run")
                  lines.extend(f"- {e}" for e in errs)
              else:
                  lines.append("_No errors logged this run._")

          text = "\n".join(lines) + "\n"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write(text)
          print(text)
          PY

      - name: Commit updated weather files
        run: |
          git config user.name "rdbf-weather-bot"
          git config user.email "actions@users.noreply.github.com"

          # weather_summary.json  = snapshot (newest wins).
          # weather_history.csv   = ledger (never lose a row).
          #
          # On a push rejection we sync to the remote and REGENERATE both files
          # against the remote's state before retrying. Because the Python
          # merges history by date (updates today's row, keeps all prior rows),
          # re-running after syncing produces a correct union with no conflict
          # and no lost history.
          for attempt in 1 2 3 4 5; do
            git add weather_summary.json weather_history.csv
            if git diff --cached --quiet; then
              echo "No weather changes to commit."
              exit 0
            fi
            git commit -m "Weather update $(date -u +'%Y-%m-%d %H:%M UTC')"

            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi

            echo "Push rejected — syncing to remote, then regenerating (attempt $attempt)."
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
            # Re-run the pre-processor against the remote's history so today's
            # row is merged into the up-to-date ledger, not an overwrite of it.
            python fetch_weather.py
            sleep 2
          done

          echo "Push still failing after 5 attempts."
          exit 1
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
