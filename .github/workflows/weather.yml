name: RDBF Weather Pre-Processor
on:
  schedule:
    # 09:35 UTC = 5:35 AM EDT (4:35 AM EST in winter).
    # Second run at 21:35 UTC = 5:35 PM EDT for an evening refresh.
    - cron: "35 9 * * *"
    - cron: "35 21 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing
# Prevent two runs from pushing to main at the same time. Queue them instead
# of running concurrently, so pushes never collide.
concurrency:
  group: weather-writer
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run weather pre-processor
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
        run: python fetch_weather.py
      - name: Commit updated weather_summary.json
        run: |
          git config user.name "rdbf-weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add weather_summary.json weather_history.csv
          # Nothing changed? Exit cleanly.
          if git diff --cached --quiet; then
            echo "No weather changes to commit."
            exit 0
          fi
          git commit -m "Weather update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push, but if the remote moved since checkout, rebase on top and retry.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — pulling remote changes and retrying ($attempt)."
            git pull --rebase --autostash origin main
            sleep 3
          done
          echo "Push still failing after 3 attempts."
          exit 1
