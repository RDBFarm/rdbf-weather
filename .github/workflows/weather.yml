name: RDBF Weather Pre-Processor

on:
  schedule:
    # 09:35 UTC = 5:35 AM EDT (4:35 AM EST in winter).
    # Second run at 21:35 UTC = 5:35 PM EDT for an evening refresh.
    - cron: "35 9 * * *"
    - cron: "35 21 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run weather pre-processor
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
        run: python fetch_weather.py

      - name: Commit updated weather_summary.json
        run: |
          git config user.name "rdbf-weather-bot"
          git config user.email "actions@users.noreply.github.com"
          git add weather_summary.json
          git diff --cached --quiet || git commit -m "Weather update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
