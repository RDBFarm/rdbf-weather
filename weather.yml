name: RDBF Weather Pre-Processor

on:
  schedule:
    # 09:35 UTC = 5:35 AM EDT (4:35 AM EST in winter).
    # Second run at 21:35 UTC = 5:35 PM EDT for an evening refresh.
    - cron: "35 9 * * *"
    - cron: "35 21 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

# Queue runs so they never overlap.
concurrency:
  group: weather-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run weather pre-processor
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
        run: python fetch_weather.py

      - name: Commit updated weather files
        run: |
          git config user.name "rdbf-weather-bot"
          git config user.email "actions@users.noreply.github.com"

          # weather_summary.json  = snapshot (newest wins).
          # weather_history.csv   = ledger (never lose a row).
          #
          # On a push rejection we sync to the remote and REGENERATE both files
          # against the remote's state before retrying. Because the Python
          # merges history by date (updates today's row, keeps all prior rows),
          # re-running after syncing produces a correct union with no conflict
          # and no lost history.
          for attempt in 1 2 3 4 5; do
            git add weather_summary.json weather_history.csv
            if git diff --cached --quiet; then
              echo "No weather changes to commit."
              exit 0
            fi
            git commit -m "Weather update $(date -u +'%Y-%m-%d %H:%M UTC')"

            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi

            echo "Push rejected — syncing to remote, then regenerating (attempt $attempt)."
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
            # Re-run the pre-processor against the remote's history so today's
            # row is merged into the up-to-date ledger, not an overwrite of it.
            python fetch_weather.py
            sleep 2
          done

          echo "Push still failing after 5 attempts."
          exit 1
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
